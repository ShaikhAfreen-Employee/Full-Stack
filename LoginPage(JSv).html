<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #fff;
      color: #333;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="login">
  <h2>Login 🔐</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  if(email.value=="admin@gmail.com" && password.value=="1234"){
    alert("Login Success!");
  } else {
    alert("Invalid!");
  }
}
</script>

</body>
</html>
